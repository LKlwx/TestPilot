name: CI Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint check (black + isort + flake8 + mypy)
      run: |
        flake8 . --count --max-complexity=12 --max-line-length=120 --extend-ignore=E203,W503,E402,E501,F401,C901 --exclude=.venv,.git,__pycache__,migrations --statistics
        black --check --diff .
        isort --check-only --diff .
        mypy service/ core/ --ignore-missing-imports || true

    - name: Run Unit Tests
      run: |
        pip install pytest pytest-cov
        pytest tests/ -v --cov=. --cov-report=term-missing

    - name: Run SAST scan (own code)
      run: |
        pip install bandit
        bandit -r . --skip B101 --exclude ./tests,./migrations -ll

    - name: Check dependency vulnerabilities (SCA)
      run: |
        pip install pip-audit
        pip-audit -r requirements.txt