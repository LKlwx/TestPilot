[tool.black]
line-length = 120
target-version = ["py310"]

[tool.isort]
profile = "black"
line_length = 120

[tool.flake8]
max-complexity = 12
max-line-length = 120
extend-ignore = "E203,W503,E402,E501,F401,C901"
exclude = ".venv,.git,__pycache__,migrations"

[tool.mypy]
ignore_missing_imports = true
follow_imports = "skip"
exclude = ["^tests/", "^scripts/", "^migrations/"]
