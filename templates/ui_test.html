{% extends "base.html" %}

{% block title %}UI自动化测试{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pages/test-forms.css">
{% endblock %}

{% block content %}
<div class="card">
    <h3>UI测试用例</h3>
    <input id="name" class="form-input" placeholder="用例名称（如：百度搜索测试）">
    <input id="url" class="form-input" placeholder="打开网址（https://www.baidu.com）">

    <div class="test-form-row">
        <select id="action" class="form-select">
            <option value="click">点击</option>
            <option value="input">输入</option>
            <option value="wait">等待</option>
        </select>
        <select id="locator" class="form-select">
            <option value="id">ID 定位</option>
            <option value="name">Name 定位</option>
            <option value="xpath">XPath 定位</option>
            <option value="css">CSS 定位</option>
            <option value="linkText">链接文本</option>
        </select>
        <input id="value" class="form-input" placeholder="定位值/输入内容">
    </div>
    <button class="btn btn-primary" onclick="addStep()">添加步骤</button>

    <textarea id="steps" class="form-textarea" rows="4" placeholder="自动生成的操作步骤（可编辑）"></textarea>
    <br>
    <button class="btn btn-primary" onclick="saveCase()">保存用例</button>
</div>

<div class="card">
    <h3>用例列表</h3>
    <div class="search-bar">
        <input id="searchKeyword" class="form-input" placeholder="搜索用例名称...">
        <button class="btn btn-primary" onclick="searchCases()">搜索</button>
        <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th>序号</th>
            <th>用例名</th>
            <th>网址</th>
            <th>定位方式</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="caseList"></tbody>
    </table>
    <div class="pagination">
        <button onclick="prevPage()" id="prevBtn">上一页</button>
        <span id="pageInfo">第 1 页 / 共 1 页 (共 0 条)</span>
        <button onclick="nextPage()" id="nextBtn">下一页</button>
    </div>
</div>

<div class="card">
    <h3>执行结果</h3>
    <pre id="result" class="code-block">等待执行...</pre>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let total = 0;

    window.onload = function () {
        checkLogin();
        loadCases();
    };

    async function loadCases(page = 1) {
        const keyword = document.getElementById("searchKeyword").value;
        try {
            const r = await httpGet(`/api/ui/cases?page=${page}&page_size=${pageSize}&keyword=${encodeURIComponent(keyword)}`);
            const data = r.data || {};
            const list = data.list || [];
            currentPage = data.page || 1;
            totalPages = data.total_pages || 1;
            total = data.total || 0;

            let html = "";
            const startIndex = (currentPage - 1) * pageSize;
            list.forEach((c, i) => {
                html += `
                <tr>
                    <td>${startIndex + i + 1}</td>
                    <td>${c.name}</td>
                    <td>${c.url}</td>
                    <td>${c.loc_type}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editUICase(${c.id})">编辑</button>
                        <button class="btn btn-success" onclick="runUICase(${c.id})">执行</button>
                        <button class="btn btn-danger" onclick="del(${c.id})">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById("caseList").innerHTML = html;
            document.getElementById("pageInfo").innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页 (共 ${total} 条)`;
            document.getElementById("prevBtn").disabled = currentPage <= 1;
            document.getElementById("nextBtn").disabled = currentPage >= totalPages;
        } catch (err) {
            showAlert("加载用例失败", "error");
        }
    }

    function searchCases() {
        currentPage = 1;
        loadCases(1);
    }

    function resetSearch() {
        document.getElementById("searchKeyword").value = "";
        currentPage = 1;
        loadCases(1);
    }

    function prevPage() {
        if (currentPage > 1) loadCases(currentPage - 1);
    }

    function nextPage() {
        if (currentPage < totalPages) loadCases(currentPage + 1);
    }


    function addStep() {
        const action = document.getElementById("action").value;
        const locator = document.getElementById("locator").value;
        const value = document.getElementById("value").value;
        if (!value) {
            showAlert("请输入定位值或内容", "warning");
            return;
        }
        const step = `[${action}] [${locator}] ${value}\n`;
        const stepsArea = document.getElementById("steps");
        stepsArea.value += step;

        document.getElementById("value").value = "";
        showAlert("步骤已添加", "success");
    }

    async function saveCase() {
        const nameEl = document.getElementById("name");
        const name = nameEl.value.trim();
        const url = document.getElementById("url").value.trim();
        const steps = document.getElementById("steps").value.trim();
        const loc_type = document.getElementById("locator").value;
        const loc_value = document.getElementById("value").value;
        const editId = nameEl.dataset.editId;

        if (!name || !url) {
            showAlert("请完善用例信息", "warning");
            return;
        }

        const payload = {
            name: name,
            url: url,
            steps: steps,
            loc_type: loc_type,
            loc_value: loc_value
        };

        try {
            if (editId) {
                await fetch(`/api/ui/case/${editId}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + localStorage.getItem("token")
                    },
                    body: JSON.stringify(payload)
                });
                delete nameEl.dataset.editId;
                showAlert("更新成功", "success");
            } else {
                await httpPost("/api/ui/case/struct", payload);
                showAlert("保存成功", "success");
            }

            loadCases();
            nameEl.value = "";
            document.getElementById("url").value = "";
            document.getElementById("steps").value = "";
            document.getElementById("value").value = "";
        } catch (err) {
            showAlert("操作失败", "error");
        }
    }

    async function del(id) {
        if (!confirm("确定删除？")) return;
        try {
            await httpDelete(`/api/ui/case/${id}`);
            showAlert("删除成功", "success");
            loadCases();
        } catch (err) {
            showAlert("删除失败", "error");
        }
    }

    async function editUICase(id) {
        try {
            const r = await httpGet("/api/ui/cases?page=1&page_size=1000");
            const caseData = (r.data.list || r.data).find(c => c.id === id);
            if (!caseData) {
                showAlert("用例不存在", "error");
                return;
            }

            document.getElementById("name").value = caseData.name;
            document.getElementById("url").value = caseData.url;
            document.getElementById("locator").value = caseData.loc_type || "xpath";
            document.getElementById("value").value = caseData.loc_value || "";
            document.getElementById("steps").value = caseData.steps || "";
            document.getElementById("name").dataset.editId = id;
            showAlert("已加载用例信息，修改后点击保存即可", "info");
        } catch (err) {
            showAlert("获取用例信息失败", "error");
        }
    }
    
    async function runUICase(cid) {
        try {
            showAlert("UI自动化执行中...", "info");
            const r = await httpPost(`/api/ui/case/${cid}/run`, {});
            document.getElementById("result").innerText = JSON.stringify(r, null, 2);
            if (r.data && r.data.status === "PASS") {
                showAlert("执行通过", "success");
            } else {
                showAlert("执行失败", "error");
            }
        } catch (err) {
            showAlert("执行请求失败", "error");
        }
    }
</script>
{% endblock %}
