{% extends "base.html" %}

{% block title %}操作日志{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pages/test-forms.css">
<style>
    .log-container {
        max-width:1200px; 
        margin:0 auto;
    }
    
    .search-area {
        margin:20px 0;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
    }
</style>
{% endblock %}

{% block content %}
<div class="log-container">
    <h2>操作日志</h2>
    <div class="search-area">
        <input id="searchKeyword" class="form-input" placeholder="搜索用户名或操作类型..."
               style="width:250px; display:inline-block;">
        <input type="text" id="searchDate" class="form-input" placeholder="日期如 2026-04-22"
               style="width:170px; display:inline-block;">
        <button class="btn btn-primary" onclick="searchLogs()">搜索</button>
        <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
        <button class="btn btn-danger" onclick="deleteOldLogs()" style="margin-left:20px;">清理30天前日志</button>
    </div>

    <table class="table">
        <thead>
        <tr>
            <th>时间</th>
            <th>用户名</th>
            <th>操作类型</th>
            <th>详情</th>
            <th>IP地址</th>
        </tr>
        </thead>
        <tbody id="logTable"></tbody>
    </table>

    <div class="pagination">
        <button onclick="prevPage()" id="prevBtn">上一页</button>
        <span id="pageInfo">第 1 页 / 共 1 页 (共 0 条)</span>
        <button onclick="nextPage()" id="nextBtn">下一页</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let total = 0;

    window.onload = function() {
        checkLogin();
        loadLogs();
    };

    async function loadLogs(page = 1) {
        const keyword = document.getElementById("searchKeyword").value;
        const date = document.getElementById("searchDate").value;
        try {
            const res = await httpGet(`/api/auth/operation/logs?page=${page}&page_size=${pageSize}&keyword=${encodeURIComponent(keyword)}&date=${date}`);
            const data = res.data || {};
            const list = data.list || [];
            currentPage = data.page || 1;
            totalPages = data.total_pages || 1;
            total = data.total || 0;

            let html = "";
            list.forEach(log => {
                html += `
                <tr>
                    <td>${log.operate_time}</td>
                    <td>${log.username}</td>
                    <td>${log.operation}</td>
                    <td>${log.detail || '-'}</td>
                    <td>${log.ip}</td>
                </tr>`;
            });
            if (html === "") html = '<tr><td colspan="5" style="text-align:center;">暂无数据</td></tr>';
            document.getElementById("logTable").innerHTML = html;
            document.getElementById("pageInfo").innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页 (共 ${total} 条)`;
            document.getElementById("prevBtn").disabled = currentPage <= 1;
            document.getElementById("nextBtn").disabled = currentPage >= totalPages;
        } catch (err) {
            showAlert("加载日志失败", "error");
        }
    }

    function searchLogs() {
        currentPage = 1;
        loadLogs(1);
    }

    function resetSearch() {
        document.getElementById("searchKeyword").value = "";
        document.getElementById("searchDate").value = "";
        currentPage = 1;
        loadLogs(1);
    }

    function prevPage() {
        if (currentPage > 1) loadLogs(currentPage - 1);
    }

    function nextPage() {
        if (currentPage < totalPages) loadLogs(currentPage + 1);
    }

    async function deleteOldLogs() {
        if (!confirm("确定要删除30天前的所有日志吗？此操作不可恢复！")) return;
        try {
            const res = await httpPost("/api/auth/operation/logs/cleanup", {});
            if (res.code === 200) {
                showAlert("清理完成", "success");
                loadLogs(1);
            } else {
                showAlert(res.msg || "清理失败", "error");
            }
        } catch (err) {
            showAlert("清理失败", "error");
        }
    }
</script>
{% endblock %}
