{% extends "base.html" %}

{% block title %}个人中心{% endblock %}

{% block extra_css %}
<style>
    .profile-card {
        max-width: 500px;
        margin: 20px auto;
    }
    
    .info { 
        background: #f7fafc; 
        padding: 24px; 
        border-radius: 12px; 
        margin-bottom: 24px;
        border: 1px solid #e2e8f0;
    }
    
    .info p { 
        margin: 10px 0;
        font-size: 14px;
        color: #4a5568;
        line-height: 1.6;
    }
    
    .info p strong {
        color: #2d3748;
        font-weight: 600;
    }
    
    .form-group { 
        margin-bottom: 20px; 
    }
    
    .form-group label { 
        display: block; 
        margin-bottom: 8px; 
        font-size: 14px;
        font-weight: 500;
        color: #4a5568;
        cursor: default;
    }
    
    .btn-group { 
        margin-top: 28px; 
    }
</style>
{% endblock %}

{% block content %}
<div class="card profile-card">
    <h3>个人信息</h3>
    <div class="info">
        <p><strong>用户名：</strong><span id="username"></span></p>
        <p><strong>邮箱：</strong><span id="email"></span></p>
        <p><strong>角色：</strong><span id="role"></span></p>
        <p><strong>注册时间：</strong><span id="createTime"></span></p>
    </div>

    <h3>修改密码</h3>
    <div class="form-group">
        <label>当前密码</label>
        <input type="password" id="oldPassword" class="form-input" placeholder="请输入当前密码">
    </div>
    <div class="form-group">
        <label>新密码</label>
        <input type="password" id="newPassword" class="form-input" placeholder="请输入新密码">
    </div>
    <div class="form-group">
        <label>确认新密码</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入新密码">
    </div>
    <div class="btn-group">
        <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    window.onload = function() {
        checkLogin();
        loadUserInfo();
    };

    async function loadUserInfo() {
        try {
            const res = await httpGet("/api/auth/profile");
            const user = res.data || {};
            document.getElementById("username").innerText = user.username || '-';
            document.getElementById("email").innerText = user.email || '-';
            document.getElementById("role").innerText = user.role === 'admin' ? '管理员' : '测试员';
            document.getElementById("createTime").innerText = user.create_time || '-';
        } catch (err) {
            showAlert("加载用户信息失败", "error");
        }
    }

    async function changePassword() {
        const oldPwd = document.getElementById("oldPassword").value;
        const newPwd = document.getElementById("newPassword").value;
        const confirmPwd = document.getElementById("confirmPassword").value;

        if (!oldPwd || !newPwd || !confirmPwd) {
            showAlert("请填写所有密码字段", "warning");
            return;
        }

        if (newPwd !== confirmPwd) {
            showAlert("两次输入的新密码不一致", "warning");
            return;
        }

        if (newPwd.length < 6) {
            showAlert("新密码长度不能少于6位", "warning");
            return;
        }

        try {
            const res = await httpPost("/api/auth/change-password", {
                old_password: oldPwd,
                new_password: newPwd
            });
            showAlert("密码修改成功", "success");
            document.getElementById("oldPassword").value = "";
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmPassword").value = "";
        } catch (err) {
            showAlert(err.msg || "密码修改失败", "error");
        }
    }
</script>
{% endblock %}
