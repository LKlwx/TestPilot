<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI接口用例生成</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        pre {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 6px;
        }
    </style>
</head>

<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px;">
        <span id="roleText" style="margin-right:15px;"></span>
        <button onclick="logout()" style="background:#dc3545;">退出登录</button>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>
        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>
        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>
        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
    </div>

    <div class="content">
        <div class="card">
            <h3>AI 接口用例生成</h3>
            <br>
            <textarea id="scene" rows="4" placeholder="输入业务场景，例如：用户登录、查询订单"></textarea>
            <br><br>
            <button onclick="generate()">生成用例</button>
            <button onclick="saveCase()">保存到接口用例库</button>
        </div>
        <div class="card">
            <h3>生成结果</h3>
            <pre id="result">等待生成...</pre>
        </div>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script>
    let currentData = null;

    async function generate() {
        let scene = document.getElementById("scene").value.trim();
        if (!scene) {
            showAlert("请输入业务场景", "warning");
            return;
        }
        try {
            showAlert("AI 生成中，请稍候...", "success");
            const res = await httpPost("/api/ai/generate/api", {scene});

            if (res.code === 200 && res.data) {
                currentData = res.data;
                document.getElementById("result").innerText = JSON.stringify(res.data, null, 2);
                showAlert("生成成功", "success");
            } else {
                showAlert(res.msg || "生成失败", "error");
            }
        } catch (err) {
            showAlert("网络异常或服务错误", "error");
            console.error("AI生成接口异常：", err);
        }
    }

    async function saveCase() {
        if (!currentData) {
            showAlert("请先生成用例", "error");
            return;
        }
        try {
            const res = await httpPost("/api/ai/save/api", currentData);
            showAlert(res.msg || "保存成功", "success");
        } catch (err) {
            showAlert("保存失败", "error");
            console.error("保存用例异常：", err);
        }
    }
</script>
</body>
</html>
