<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>接口测试报告</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>
<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px;">
        <span id="roleText" style="margin-right:15px;"></span>
        <button onclick="logout()" style="background:#dc3545;">退出登录</button>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>
        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>
        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>
        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
    </div>

    <div class="content">
        <div class="card">
            <h3>测试报告列表</h3>
            <br>
            <table>
                <thead>
                <tr>
                    <th>序号</th>
                    <th>用例名称</th>
                    <th>状态</th>
                    <th>状态码</th>
                    <th>耗时(s)</th>
                    <th>执行时间</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="reportList"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
    <div style="background:#fff; margin:50px auto; padding:20px; width:70%; border-radius:8px;">
        <h3>详情</h3>
        <pre id="detailContent" style="max-height:400px; overflow-y:auto;"></pre>
        <br>
        <button onclick="closeModal()">关闭</button>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script>
    // 统一页面加载
    window.onload = function () {
        checkLogin();
        loadReports();
    };

    // 加载报告列表
    async function loadReports() {
        try {
            const res = await httpGet("/api/test/reports/data");
            const list = res.data || [];
            let html = "";
            list.forEach(item => {
                html += `
                <tr>
                    <td>${item.id}</td>
                    <td>${item.case_name}</td>
                    <td class="${item.status.toLowerCase()}">${item.status}</td>
                    <td>${item.code}</td>
                    <td>${item.time}</td>
                    <td>${item.create_time}</td>
                    <td>${item.msg || '-'}</td>
                    <td><button onclick="showDetail(${item.id})">查看</button></td>
                </tr>`;
            });
            document.getElementById("reportList").innerHTML = html;
        } catch (err) {
            showAlert("加载报告失败", "error");
            console.error(err);
        }
    }

    // 查看详情
    async function showDetail(id) {
        try {
            const res = await httpGet(`/api/test/report/${id}`);
            document.getElementById("detailContent").innerText = JSON.stringify(res.data, null, 2);
            document.getElementById("detailModal").style.display = "block";
        } catch (err) {
            showAlert("加载详情失败", "error");
            console.error(err);
        }
    }

    // 关闭弹窗
    function closeModal() {
        document.getElementById("detailModal").style.display = "none";
    }
</script>
</body>
</html>
