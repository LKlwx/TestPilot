{% extends "base.html" %}

{% block title %}用户管理{% endblock %}

{% block content %}
<div class="card">
    <h3>用户管理（仅管理员可操作）</h3>
    <table class="table" id="userTable">
        <thead>
        <tr>
            <th>ID</th>
            <th>用户名</th>
            <th>角色</th>
            <th>创建时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function loadUserList() {
        try {
            let res = await httpGet("/api/auth/user/list/data");
            if (res.code !== 200) {
                showAlert(res.msg || "获取用户列表失败", "error");
                return;
            }

            let tbody = document.getElementById("tbody");
            tbody.innerHTML = "";

            let currentUser = localStorage.getItem("username");

            res.data.forEach(user => {
                let tr = document.createElement("tr");
                let roleText = user.role === 'admin' ? '管理员' : '普通用户';

                let buttons = "";
                if (currentUser === "admin") {
                    if (user.role === "admin") {
                        // 对方已经是管理员，只提供降级选项
                        buttons = `
                        <button class="btn btn-secondary" onclick="changeRole(${user.id}, 'tester')">设为普通用户</button>
                        <button class="btn btn-danger" onclick="deleteUser(${user.id})">删除</button>
                        `;
                    } else {
                        // 对方是普通用户，只提供升级选项
                        buttons = `
                        <button class="btn btn-primary" onclick="changeRole(${user.id}, 'admin')">设为管理员</button>
                        <button class="btn btn-danger" onclick="deleteUser(${user.id})">删除</button>
                        `;
                    }
                } else {
                    if (user.role === "tester") {
                        buttons = `<button class="btn btn-danger" onclick="deleteUser(${user.id})">删除</button>`;
                    }
                }

                tr.innerHTML = `
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${roleText}</td>
                <td>${user.create_time}</td>
                <td>${buttons}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            showAlert("登录已失效，请重新登录", "error");
            setTimeout(() => location.href = "/api/auth/login/page", 1500);
        }
    }

    async function changeRole(userId, role) {
        if (!confirm("确定要修改该用户角色吗？")) return;
        try {
            let res = await httpPost("/api/auth/user/role/change", {
                id: userId,
                role: role
            });
            if (res.code === 200) {
                showAlert("修改成功", "success");
                loadUserList();
            } else {
                showAlert(res.msg || "修改失败", "error");
            }
        } catch (err) {
            showAlert("请求失败", "error");
        }
    }

    async function deleteUser(userId) {
        if (!confirm("确定删除该用户？此操作不可恢复！")) return;
        try {
            let res = await httpPost(`/api/auth/user/delete/${userId}`);
            if (res.code === 200) {
                showAlert("删除成功", "success");
                loadUserList();
            } else {
                showAlert(res.msg || "删除失败", "error");
            }
        } catch (err) {
            showAlert("请求失败", "error");
        }
    }

    window.onload = function () {
        checkLogin();
        loadUserList();
    };
</script>
{% endblock %}
