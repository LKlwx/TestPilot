{% extends "base.html" %}

{% block title %}性能测试{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pages/test-forms.css">
{% endblock %}

{% block content %}
<!-- 新建用例 -->
<div class="card">
    <h3>新建性能测试用例</h3>
    <input id="name" class="form-input" placeholder="用例名称（如：百度首页压测）">
    <input id="url" class="form-input" placeholder="压测URL（https://www.baidu.com）">
    <input id="method" class="form-input" placeholder="请求方法" value="GET">
    <input id="concurrency" class="form-input" placeholder="并发数" value="10">
    <input id="total" class="form-input" placeholder="总请求数" value="50">
    <button onclick="saveCase()" class="btn btn-primary">保存用例</button>
</div>

<!-- 用例列表 -->
<div class="card">
    <h3>用例列表</h3>
    <div class="search-bar">
        <input id="searchKeyword" class="form-input" placeholder="搜索用例名称...">
        <button class="btn btn-primary" onclick="searchCases()">搜索</button>
        <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th>序号</th>
            <th>用例名</th>
            <th>并发</th>
            <th>总数</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="caseList"></tbody>
    </table>
    <div class="pagination">
        <button onclick="prevPage()" id="prevBtn">上一页</button>
        <span id="pageInfo">第 1 页 / 共 1 页 (共 0 条)</span>
        <button onclick="nextPage()" id="nextBtn">下一页</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let total = 0;

    window.onload = function () {
        checkLogin();
        loadList();
    };

    async function loadList(page = 1) {
        const keyword = document.getElementById("searchKeyword").value;
        try {
            const res = await httpGet(`/api/performance/cases?page=${page}&page_size=${pageSize}&keyword=${encodeURIComponent(keyword)}`);
            const data = res.data || {};
            const list = data.list || [];
            currentPage = data.page || 1;
            totalPages = data.total_pages || 1;
            total = data.total || 0;

            let html = "";
            const startIndex = (currentPage - 1) * pageSize;
            list.forEach((item, i) => {
                html += `
                <tr>
                    <td>${startIndex + i + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.concurrency}</td>
                    <td>${item.total}</td>
                    <td>
                        <button class="btn btn-primary" onclick="editCase(${item.id})">编辑</button>
                        <button class="btn btn-success" onclick="runTest(${item.id})">执行</button>
                        <button class="btn btn-danger" onclick="delCase(${item.id})">删除</button>
                    </td>
                </tr>`;
            });

            document.getElementById("caseList").innerHTML = html;
            document.getElementById("pageInfo").innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页 (共 ${total} 条)`;
            document.getElementById("prevBtn").disabled = currentPage <= 1;
            document.getElementById("nextBtn").disabled = currentPage >= totalPages;
        } catch (err) {
            showAlert("加载性能用例失败", "error");
            console.error(err);
        }
    }

    function searchCases() {
        currentPage = 1;
        loadList(1);
    }

    function resetSearch() {
        document.getElementById("searchKeyword").value = "";
        currentPage = 1;
        loadList(1);
    }

    function prevPage() {
        if (currentPage > 1) loadList(currentPage - 1);
    }

    function nextPage() {
        if (currentPage < totalPages) loadList(currentPage + 1);
    }

    async function saveCase() {
        const name = document.getElementById("name").value.trim();
        const url = document.getElementById("url").value.trim();
        const concurrency = document.getElementById("concurrency").value.trim();
        const total = document.getElementById("total").value.trim();

        if (!name || !url || !concurrency || !total) {
            showAlert("所有字段均为必填", "warning");
            return;
        }

        const data = {
            name: name, url: url, method: document.getElementById("method").value,
            concurrency: concurrency, total: total
        };

        try {
            if (editId) {
                await httpPut(`/api/performance/case/${editId}`, data);
                editId = null;
                showAlert("修改成功", "success");
            } else {
                await httpPost("/api/performance/case", data);
                showAlert("保存成功", "success");
            }
            loadList();
            document.getElementById("name").value = "";
            document.getElementById("url").value = "";
        } catch (err) {
            showAlert("操作失败", "error");
        }
    }

    async function runTest(id) {
        try {
            showAlert("压测执行中，请稍候...", "info");
            const resultArea = document.createElement('div');
            resultArea.className = 'card';
            resultArea.innerHTML = '<h3>执行结果</h3><pre id="perfResult" class="code-block"><span class="loading-spinner"></span><span class="loading-text">压测执行中，请稍候...</span></pre>';
            document.querySelector('.card:last-of-type').after(resultArea);
            window.scrollTo(0, document.body.scrollHeight);
            
            const res = await httpPost(`/api/performance/case/${id}/run`, {});
            document.getElementById("perfResult").innerText = JSON.stringify(res, null, 2);
            showAlert(res.msg || "压测完成", "success");
        } catch (err) {
            showAlert("压测执行失败", "error");
            console.error(err);
        }
    }

    let editId = null;

    async function editCase(id) {
        try {
            const res = await httpGet("/api/performance/cases?page=1&page_size=1000");
            const item = (res.data.list || res.data).find(c => c.id === id);
            if (!item) return;
            document.getElementById("name").value = item.name;
            document.getElementById("url").value = item.url;
            document.getElementById("method").value = item.method;
            document.getElementById("concurrency").value = item.concurrency;
            document.getElementById("total").value = item.total;
            editId = id;
            window.scrollTo(0, 0);
            showAlert("已加载用例数据，请修改后点击保存", "success");
        } catch (err) {
            showAlert("加载数据失败", "error");
        }
    }

    async function delCase(id) {
        if (!confirm("确定删除？")) return;
        try {
            await httpDelete(`/api/performance/case/${id}`);
            showAlert("删除成功", "success");
            loadList();
        } catch (err) {
            showAlert("删除失败", "error");
        }
    }
</script>
{% endblock %}
