<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>性能测试</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        button.danger {
            background: #dc3545;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        button {
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            margin-left: 6px;
        }

        button.primary {
            background: #007bff;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 5px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #eee;
        }

        th {
            background: #f5f7fa;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px;">
        <span id="roleText" style="margin-right:15px;"></span>
        <button onclick="logout()" style="background:#dc3545;">退出登录</button>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>

        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>

        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>

        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
    </div>
    <div class="content">
        <!-- 新建用例 -->
        <div class="card">
            <h3>新建性能测试用例</h3>
            <input id="name" placeholder="用例名称（如：百度首页压测）">
            <input id="url" placeholder="压测URL（https://www.baidu.com）">
            <input id="method" placeholder="请求方法" value="GET">
            <input id="concurrency" placeholder="并发数" value="10">
            <input id="total" placeholder="总请求数" value="50">
            <button onclick="saveCase()" class="primary">保存用例</button>
        </div>

        <!-- 用例列表 -->
        <div class="card">
            <h3>用例列表</h3>
            <table>
                <thead>
                <tr>
                    <th>序号</th>
                    <th>用例名</th>
                    <th>并发</th>
                    <th>总数</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="caseList"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script>
    window.onload = function () {
        checkLogin();
        loadList();
    };

    // 加载用例列表
    async function loadList() {
        try {
            const res = await httpGet("/api/performance/cases");
            const list = res.data || [];
            let html = "";

            list.forEach((item, i) => {
                html += `
                <tr>
                    <td>${i + 1}</td>
                    <td>${item.name}</td>
                    <td>${item.concurrency}</td>
                    <td>${item.total}</td>
                    <td>
                        <button class="primary" onclick="runTest(${item.id})">执行压测</button>
                        <button class="danger" onclick="delCase(${item.id})">删除</button>
                    </td>
                </tr>`;
            });

            document.getElementById("caseList").innerHTML = html;
        } catch (err) {
            showAlert("加载性能用例失败", "error");
            console.error(err);
        }
    }

    // 保存用例
    async function saveCase() {
        const name = document.getElementById("name").value.trim();
        const url = document.getElementById("url").value.trim();
        const concurrency = document.getElementById("concurrency").value.trim();
        const total = document.getElementById("total").value.trim();

        if (!name || !url || !concurrency || !total) {
            showAlert("所有字段均为必填", "warning");
            return;
        }

        const data = {
            name: name,
            url: url,
            method: document.getElementById("method").value,
            concurrency: concurrency,
            total: total
        };

        try {
            await httpPost("/api/performance/case", data);
            showAlert("保存成功", "success");
            loadList();
            // 清空输入框
            document.getElementById("name").value = "";
            document.getElementById("url").value = "";
        } catch (err) {
            showAlert("保存失败", "error");
            console.error(err);
        }
    }

    // 执行压测
    async function runTest(id) {
        try {
            showAlert("压测执行中，请稍候...", "success");
            const res = await httpPost(`/api/performance/case/${id}/run`, {});
            showAlert(res.msg || "压测完成", "success");
            location.href = "/api/performance/reports/page";
        } catch (err) {
            showAlert("压测执行失败", "error");
            console.error(err);
        }
    }

    // 删除用例
    async function delCase(id) {
        if (!confirm("确定删除？")) return;
        try {
            await httpDelete(`/api/performance/case/${id}`);
            showAlert("删除成功", "success");
            loadList();
        } catch (err) {
            showAlert("删除失败", "error");
        }
    }
</script>
</body>
</html>
