{% extends "base.html" %}

{% block title %}控制台首页{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pages/dashboard.css">
{% endblock %}

{% block content %}
<div class="stats-row">
    <div class="stat-card" data-tooltip="总用例数 = 接口用例 + UI用例 + 性能用例">
        <div class="num" id="total_case">0</div>
        <div class="label">总用例数</div>
    </div>
    <div class="stat-card" data-tooltip="接口自动化测试用例数量">
        <div class="num" id="api_case">0</div>
        <div class="label">接口用例数</div>
    </div>
    <div class="stat-card" data-tooltip="UI自动化测试用例数量">
        <div class="num" id="ui_case">0</div>
        <div class="label">UI用例数</div>
    </div>
    <div class="stat-card" data-tooltip="性能压测配置次数">
        <div class="num" id="perf_count">0</div>
        <div class="label">性能压测次数</div>
    </div>
    <div class="stat-card" data-tooltip="测试通过率 = 接口+UI通过数 / 接口+UI总数">
        <div class="num" id="pass_rate">0%</div>
        <div class="label">测试通过率</div>
    </div>
</div>

<div class="chart-row">
    <div class="chart-box" id="pieChart"></div>
    <div class="chart-box" id="lineChart"></div>
</div>
<div class="chart-box-full" id="perfChart"></div>

<div class="card">
    <h3>平台状态</h3>
    <p>👤 当前登录：<span id="loginUser"></span></p>
    <p>🔖 系统版本：v1.0</p>
    <p>🟢 服务状态：运行正常</p>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/echarts.min.js"></script>
<script>
    let pieChart, lineChart, perfChart;

    window.onload = function () {
        checkLogin();
        initCharts();
        showLoginInfo();
        setTimeout(loadDashboardData, 50);
    };

    function initCharts() {
        pieChart = echarts.init(document.getElementById("pieChart"));
        lineChart = echarts.init(document.getElementById("lineChart"));
        perfChart = echarts.init(document.getElementById("perfChart"));
        window.addEventListener('resize', () => {
            pieChart.resize();
            lineChart.resize();
            perfChart.resize();
        });
    }

    async function loadDashboardData() {
        try {
            let res = await httpGet("/api/auth/dashboard/data");
            if (res.code !== 200) return;
            let d = res.data;

            document.getElementById("total_case").innerText = d.total_case || 0;
            document.getElementById("api_case").innerText = d.api_case || 0;
            document.getElementById("ui_case").innerText = d.ui_case || 0;
            document.getElementById("perf_count").innerText = d.perf_count || 0;
            document.getElementById("pass_rate").innerText = d.pass_rate || "0%";

            pieChart.setOption({
                title: {text: "用例类型分布"},
                tooltip: {trigger: "item"},
                series: [{
                    type: "pie",
                    data: [
                        {value: d.api_case, name: "接口用例"},
                        {value: d.ui_case, name: "UI用例"},
                        {value: d.perf_count, name: "性能压测"}
                    ]
                }]
            });

            lineChart.setOption({
                title: {text: "近7天通过率趋势"},
                xAxis: {data: d.days},
                yAxis: {type: "value", min: 0, max: 100},
                series: [{
                    type: "line",
                    data: d.pass_trend,
                    smooth: true
                }]
            });

            perfChart.setOption({
                title: {text: "性能压测指标"},
                xAxis: {data: d.perf_names},
                yAxis: [{type: "value"}, {type: "value"}],
                series: [
                    {name: "QPS", type: "bar", data: d.perf_qps},
                    {name: "响应时间", type: "line", yAxisIndex: 1, data: d.perf_rt}
                ]
            });
        } catch (err) {
            console.error("Dashboard Error:", err);
            showAlert("数据加载失败", "error");
        }
    }

    function showLoginInfo() {
        let username = localStorage.getItem("username") || "未登录";
        let role = localStorage.getItem("role");
        let text = username;
        if (username === "admin") text += "（超级管理员）";
        else if (role === "admin") text += "（管理员）";
        else if (role === "tester") text += "（普通用户）";
        document.getElementById("loginUser").innerText = text;
    }
</script>
{% endblock %}
