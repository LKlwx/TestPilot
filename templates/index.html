<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>控制台首页</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <!-- 引入 ECharts -->
    <script src="/static/js/echarts.min.js"></script>
    <style>
        .stats-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #fff;
            padding: 24px 20px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            cursor: pointer;
            position: relative;
        }

        .stat-card:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 99;
        }

        .stat-card .num {
            font-size: 32px;
            font-weight: bold;
            color: #007bff;
        }

        .stat-card .label {
            font-size: 14px;
            color: #666;
            margin-top: 8px;
        }

        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .chart-box {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            height: 350px;
        }

        .chart-box-full {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
            height: 350px;
            margin-bottom: 20px;
        }

        .content {
            flex: 1;
            padding: 20px;
            min-height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
            align-content: center;

        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px; position:relative;">
        <div onclick="toggleUserMenu()" style="display:inline-flex; align-items:center; padding:8px 15px; margin-right:10px; cursor:pointer; font-size:13px;">
            <span id="roleText"></span>
        </div>
        <div id="userMenu" style="display:none; position:absolute; right:10px; top:52px; background:#34495e; min-width:100%; z-index:9999;">
            <a href="/api/auth/profile/page" style="display:block; padding:10px 15px; color:#fff; text-decoration:none; font-size:13px;">个人中心</a>
            <a href="#" onclick="logout(); return false;" style="display:block; padding:10px 15px; color:#e74c3c; text-decoration:none; font-size:13px;">退出登录</a>
        </div>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>

        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>

        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>

        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
        <a id="operationLogMenu" href="/api/auth/operation/logs/page" style="display:none;">操作日志</a>
    </div>

    <div class="content">
        <div class="stats-row">
            <div class="stat-card" data-tooltip="总用例数 = 接口用例 + UI用例 + 性能用例">
                <div class="num" id="total_case">0</div>
                <div class="label">总用例数</div>
            </div>
            <div class="stat-card" data-tooltip="接口自动化测试用例数量">
                <div class="num" id="api_case">0</div>
                <div class="label">接口用例数</div>
            </div>
            <div class="stat-card" data-tooltip="UI自动化测试用例数量">
                <div class="num" id="ui_case">0</div>
                <div class="label">UI用例数</div>
            </div>
            <div class="stat-card" data-tooltip="性能压测配置次数">
                <div class="num" id="perf_count">0</div>
                <div class="label">性能压测次数</div>
            </div>
            <div class="stat-card" data-tooltip="测试通过率 = 接口+UI通过数 / 接口+UI总数">
                <div class="num" id="pass_rate">0%</div>
                <div class="label">测试通过率</div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-box" id="pieChart"></div>
            <div class="chart-box" id="lineChart"></div>
        </div>
        <div class="chart-box-full" id="perfChart"></div>

        <div class="card">
            <h3>平台状态</h3>
            <p>👤 当前登录：<span id="loginUser"></span></p>
            <p>🔖 系统版本：v1.0</p>
            <p>🟢 服务状态：运行正常</p>
        </div>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script>
    let pieChart, lineChart, perfChart;

    window.onload = function () {
        checkLogin();
        initCharts();
        showLoginInfo();
        setTimeout(loadDashboardData, 50);
    };

    function initCharts() {
        pieChart = echarts.init(document.getElementById("pieChart"));
        lineChart = echarts.init(document.getElementById("lineChart"));
        perfChart = echarts.init(document.getElementById("perfChart"));
        window.addEventListener('resize', () => {
            pieChart.resize();
            lineChart.resize();
            perfChart.resize();
        });
    }

    async function loadDashboardData() {
        try {
            let res = await httpGet("/api/auth/dashboard/data");
            if (res.code !== 200) return;
            let d = res.data;

            document.getElementById("total_case").innerText = d.total_case || 0;
            document.getElementById("api_case").innerText = d.api_case || 0;
            document.getElementById("ui_case").innerText = d.ui_case || 0;
            document.getElementById("perf_count").innerText = d.perf_count || 0;
            document.getElementById("pass_rate").innerText = d.pass_rate || "0%";

            pieChart.setOption({
                title: {text: "用例类型分布"},
                tooltip: {trigger: "item"},
                series: [{
                    type: "pie",
                    data: [
                        {value: d.api_case, name: "接口用例"},
                        {value: d.ui_case, name: "UI用例"},
                        {value: d.perf_count, name: "性能压测"}
                    ]
                }]
            });

            lineChart.setOption({
                title: {text: "近7天通过率趋势"},
                xAxis: {data: d.days},
                yAxis: {type: "value", min: 0, max: 100},
                series: [{
                    type: "line",
                    data: d.pass_trend,
                    smooth: true
                }]
            });

            perfChart.setOption({
                title: {text: "性能压测指标"},
                xAxis: {data: d.perf_names},
                yAxis: [{type: "value"}, {type: "value"}],
                series: [
                    {name: "QPS", type: "bar", data: d.perf_qps},
                    {name: "响应时间", type: "line", yAxisIndex: 1, data: d.perf_rt}
                ]
            });
        } catch (err) {
            console.error("Dashboard Error:", err);
            showAlert("数据加载失败", "error");
        }
    }

    function showLoginInfo() {
        let username = localStorage.getItem("username") || "未登录";
        let role = localStorage.getItem("role");
        let text = username;
        if (username === "admin") text += "（超级管理员）";
        else if (role === "admin") text += "（管理员）";
        else if (role === "tester") text += "（普通用户）";
        document.getElementById("loginUser").innerText = text;
    }
</script>
</body>
</html>
