<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>接口自动化测试</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        button.danger {
            background: #e74c3c;
        }

        pre {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 6px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            text-align: center;
            border: 1px solid #eee;
        }

        th {
            background: #f5f7fa;
        }
    </style>
</head>
<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px;">
        <span id="roleText" style="margin-right:15px;"></span>
        <button onclick="logout()" style="background:#dc3545;">退出登录</button>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>

        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>

        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>

        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
    </div>

    <div class="content">
        <!-- 1. 用例表单 -->
        <div class="card">
            <h3>接口测试用例</h3>
            <br>
            <input id="name" placeholder="用例名称：例如 测试百度">
            <select id="method">
                <option value="GET">GET</option>
                <option value="POST">POST</option>
            </select>
            <input id="url" placeholder="请求URL：例如 https://www.baidu.com">
            <textarea id="headers" rows="2" placeholder='请求头（JSON）：{"Content-Type":"application/json"}'></textarea>
            <textarea id="body" rows="3" placeholder="请求体（选填）"></textarea>
            <input id="expect" placeholder="预期包含关键字（选填）">
            <br><br>
            <button onclick="saveCase()">保存用例</button>
            <button onclick="runSelectedCase()">执行选中用例</button>
        </div>

        <!-- 2. 用例列表 -->
        <div class="card">
            <h3>我的用例列表</h3>
            <table>
                <thead>
                <tr>
                    <th>选择</th>
                    <th>序号</th>
                    <th>用例名</th>
                    <th>方法</th>
                    <th>URL</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody id="caseTable"></tbody>
            </table>
        </div>

        <!-- 3. 测试结果 -->
        <div class="card">
            <h3>测试结果</h3>
            <br>
            <pre id="result">等待执行...</pre>
        </div>
    </div>
</div>
<script src="/static/js/common.js"></script>
<script>
    // 页面加载
    window.onload = function () {
        checkLogin();
        loadCases();
    }

    // 加载用例列表
    async function loadCases() {
        try {
            const res = await httpGet("/api/test/cases");
            const cases = res.data || [];
            let html = "";
            cases.forEach((c, index) => {
                html += `
                <tr>
                    <td><input type="checkbox" class="case-item" value="${c.id}"></td>
                    <td>${index + 1}</td>
                    <td>${c.name}</td>
                    <td>${c.method}</td>
                    <td>${c.url}</td>
                    <td>
                        <button onclick="runSingle(${c.id})">执行</button>
                        <button class="danger" onclick="deleteCase(${c.id})">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById("caseTable").innerHTML = html;
        } catch (err) {
            showAlert("加载用例失败", "error");
            console.error(err);
        }
    }

    // 保存用例
    async function saveCase() {
        const name = document.getElementById("name").value.trim();
        const url = document.getElementById("url").value.trim();
        if (!name || !url) {
            showAlert("用例名称和URL不能为空", "warning");
            return;
        }
        const data = {
            name: name,
            method: document.getElementById("method").value,
            url: url,
            headers: document.getElementById("headers").value,
            body: document.getElementById("body").value,
            expect: document.getElementById("expect").value
        };
        try {
            await httpPost("/api/test/case", data);
            showAlert("保存成功", "success");
            loadCases();
            // 清空输入框
            document.getElementById("name").value = "";
            document.getElementById("url").value = "";
        } catch (err) {
            showAlert("保存失败", "error");
            console.error(err);
        }
    }

    // 单条执行
    async function runSingle(id) {
        try {
            showAlert("执行中...", "success");
            const res = await httpPost(`/api/test/case/${id}/run`, {});
            document.getElementById("result").innerText = JSON.stringify(res, null, 2);
            showAlert("执行完成", "success");
        } catch (err) {
            showAlert("执行失败", "error");
        }
    }

    // 批量执行
    async function runSelectedCase() {
        const checks = document.querySelectorAll(".case-item:checked");
        if (checks.length === 0) {
            showAlert("请至少选择一个用例", "warning");
            return;
        }
        const ids = Array.from(checks).map(i => i.value);
        try {
            showAlert("批量执行中...", "success");
            const res = await httpPost("/api/test/batch/run", {ids: ids});
            document.getElementById("result").innerText = JSON.stringify(res, null, 2);
            showAlert("批量执行完成", "success");
        } catch (err) {
            showAlert("批量执行失败", "error");
        }
    }

    // 删除用例
    async function deleteCase(id) {
        if (!confirm("确定删除？")) return;
        try {
            await httpDelete(`/api/test/case/${id}`);
            showAlert("删除成功", "success");
            loadCases();
        } catch (err) {
            showAlert("删除失败", "error");
            console.error(err);
        }
    }
</script>
</body>
</html>
