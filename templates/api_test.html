{% extends "base.html" %}

{% block title %}接口自动化测试{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/pages/test-forms.css">
{% endblock %}

{% block content %}
<!-- 覆盖率概要 -->
<div id="coverageBanner" style="cursor:pointer; margin-bottom:12px; padding:10px 16px; border-radius:6px; background:#f0f7ff; border:1px solid #cce5ff;" onclick="location.href='/api/coverage/page'">
    <strong>接口覆盖率：</strong> 加载中...
    <span style="float:right; color:#667eea;">查看详情 →</span>
</div>

<!-- 1. 用例表单 -->
<div class="card">
    <h3>接口测试用例</h3>
    <input id="name" class="form-input" placeholder="用例名称：例如 测试百度">
    <select id="method" class="form-select">
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="DELETE">DELETE</option>
    </select>
    <input id="url" class="form-input" placeholder="请求URL：例如 https://www.baidu.com">
    <input id="module" class="form-input" placeholder="所属模块：例如 登录模块 (选填)">
    <textarea id="headers" class="form-textarea" rows="2"
              placeholder='请求头（JSON）：{"Content-Type":"application/json"}'></textarea>
    <textarea id="body" class="form-textarea" rows="3" placeholder="请求体（选填）"></textarea>
    <input id="expect" class="form-input" placeholder="预期包含关键字（选填）">
    <input id="extract_var" class="form-input" placeholder="后置提取：例如 token=$.args.token (选填)">
    <input id="tags" class="form-input" placeholder="标签：例如 smoke,regression,critical (选填)">
    <div style="display: flex; gap: 10px; margin-top: 8px;">
        <input id="timeout" class="form-input" placeholder="超时秒数（选填，默认10）" value="10" style="flex:1;">
        <input id="retry" class="form-input" placeholder="失败重试次数（选填，默认0）" value="0" style="flex:1;">
        <select id="env_id" class="form-select" style="flex:1;"><option value="">环境：自动识别</option></select>
    </div>
    <br><br>
    <button id="saveBtn" class="btn btn-primary" onclick="saveCase()">保存用例</button>
    <button id="cancelEditBtn" class="btn btn-secondary" onclick="cancelEdit()" style="display:none;">取消</button>
    <button class="btn btn-success" onclick="batchRun()">批量执行</button>
    <select id="workerCount" class="form-select" style="width:auto; display:inline;" onchange="document.getElementById('parallelHint').style.display=this.value>1?'none':'block'">
        <option value="1">串行</option>
        <option value="2">2 并行</option>
        <option value="4">4 并行</option>
    </select>
    <button class="btn btn-info" onclick="showPostmanImport()">导入 Postman</button>
    <button class="btn btn-success" onclick="exportCases()">导出</button>

    <div id="postmanImportForm" style="display:none; margin-top:12px;">
        <textarea id="postmanInput" class="form-textarea" rows="6" placeholder="粘贴 Postman Collection v2.1 JSON..."></textarea>
        <br>
        <button class="btn btn-primary" onclick="importPostman()">导入</button>
        <button class="btn btn-secondary" onclick="document.getElementById('postmanImportForm').style.display='none'">取消</button>
    </div>
</div>

<!-- 2. 用例列表 -->
<div class="card">
    <h3>我的用例列表</h3>
    <div class="search-bar">
        <input id="searchKeyword" class="form-input" placeholder="搜索用例名称..." style="width:200px;">
        <input id="searchTag" class="form-input" placeholder="标签筛选如 smoke" style="width:160px;">
        <button class="btn btn-primary" onclick="searchCases()">搜索</button>
        <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th>选择</th>
            <th>序号</th>
            <th>用例名</th>
            <th>模块</th>
            <th>方法</th>
            <th>URL</th>
            <th>标签</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="caseTable"></tbody>
    </table>
    <div class="pagination">
        <button onclick="prevPage()" id="prevBtn">上一页</button>
        <span id="pageInfo">第 1 页 / 共 1 页 (共 0 条)</span>
        <button onclick="nextPage()" id="nextBtn">下一页</button>
    </div>
</div>

<!-- 3. 测试结果 -->
<div class="card">
    <h3>测试结果</h3>
    <pre id="result" class="code-block">等待执行...</pre>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentPage = 1;
    let pageSize = 10;
    let totalPages = 1;
    let total = 0;
    let editId = null;

    window.onload = function () {
        checkLogin();
        loadCases();
        loadEnvironments();
    };

    async function loadEnvironments() {
        try {
            const res = await httpGet("/api/env/list");
            const envs = res.data && res.data.list || [];
            const sel = document.getElementById("env_id");
            sel.innerHTML = `<option value="">环境：自动识别</option>`;
            envs.forEach(e => {
                sel.innerHTML += `<option value="${e.id}">${e.name}${e.is_default ? ' (默认)' : ''}</option>`;
            });
        } catch (e) { /* 环境列表加载失败不影响主流程 */ }
    }

    async function loadCoverageStats() {
        try {
            const token = localStorage.getItem("access_token");
            const resp = await fetch("/api/coverage/stats", {
                headers: token ? {"Authorization": "Bearer " + token} : {}
            });
            const json = await resp.json();
            if (json.code !== 200 || !json.data) {
                const b = document.getElementById("coverageBanner");
                if (b) b.style.display = "none";
                return;
            }
            const d = json.data;
            const banner = document.getElementById("coverageBanner");
            if (!banner) return;
            const pct = d.total > 0 ? d.rate : 100;
            const color = pct >= 80 ? "#27ae60" : pct >= 50 ? "#f39c12" : "#e74c3c";
            banner.innerHTML = `<strong>📊 接口覆盖率：</strong><span style="font-size:18px; font-weight:600; color:${color};">${d.total > 0 ? d.rate + '%' : '-'}</span>（${d.covered}/${d.total}）<span style="float:right; color:#667eea;">查看详情 →</span>`;
        } catch (e) {
            const banner = document.getElementById("coverageBanner");
            if (banner) banner.style.display = "none";
        }
    }

    async function loadCases(page = 1) {
        const keyword = document.getElementById("searchKeyword").value;
        const tag = document.getElementById("searchTag").value;
        try {
            let url = `/api/test/cases?page=${page}&page_size=${pageSize}&keyword=${encodeURIComponent(keyword)}`;
            if (tag) url += `&tag=${encodeURIComponent(tag)}`;
            const res = await httpGet(url);
            const data = res.data || {};
            const cases = data.list || [];
            currentPage = data.page || 1;
            totalPages = data.total_pages || 1;
            total = data.total || 0;

            let html = "";
            const startIndex = (currentPage - 1) * pageSize;
            cases.forEach((c, index) => {
                html += `
                <tr>
                    <td><input type="checkbox" class="case-item" value="${c.id}"></td>
                    <td>${startIndex + index + 1}</td>
                    <td>${c.name}</td>
                    <td><span class="badge badge-info">${c.module || '默认'}</span></td>
                    <td>${c.method}</td>
                    <td>${c.url}</td>
                    <td><span style="font-size:12px; color:#666;">${c.tags || '-'}</span></td>
                    <td>
                        <button class="btn btn-primary" onclick="editCase(${c.id})">编辑</button>
                        <button class="btn btn-success" onclick="runSingle(${c.id})">执行</button>
                        <button class="btn btn-danger" onclick="deleteCase(${c.id})">删除</button>
                    </td>
                </tr>`;
            });
            document.getElementById("caseTable").innerHTML = html;
            document.getElementById("pageInfo").innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页 (共 ${total} 条)`;
            document.getElementById("prevBtn").disabled = currentPage <= 1;
            document.getElementById("nextBtn").disabled = currentPage >= totalPages;
            loadCoverageStats();
        } catch (err) {
            showAlert("加载用例失败", "error");
        }
    }

    function searchCases() {
        currentPage = 1;
        loadCases(1);
    }

    function resetSearch() {
        document.getElementById("searchKeyword").value = "";
        document.getElementById("searchTag").value = "";
        currentPage = 1;
        loadCases(1);
    }

    function prevPage() {
        if (currentPage > 1) {
            loadCases(currentPage - 1);
        }
    }

    function nextPage() {
        if (currentPage < totalPages) {
            loadCases(currentPage + 1);
        }
    }

    async function saveCase() {
        const name = document.getElementById("name").value.trim();
        const url = document.getElementById("url").value.trim();
        if (!name || !url) {
            showAlert("用例名称和URL不能为空", "warning");
            return;
        }
        const data = {
            name: name,
            module: document.getElementById("module").value,
            method: document.getElementById("method").value,
            url: url,
            headers: document.getElementById("headers").value || "{}",
            body: document.getElementById("body").value || "{}",
            expect: document.getElementById("expect").value,
            extract_var: document.getElementById("extract_var").value,
            timeout: parseInt(document.getElementById("timeout").value) || 10,
            retry: parseInt(document.getElementById("retry").value) || 0,
            tags: document.getElementById("tags").value || "",
            env_id: document.getElementById("env_id").value || null,
        };
        try {
            if (editId) {
                await httpPut(`/api/test/case/${editId}`, data);
                showAlert("更新成功", "success");
            } else {
                await httpPost("/api/test/case", data);
                showAlert("保存成功", "success");
            }
            loadCases();
            resetForm();
        } catch (err) {
            showAlert("操作失败", "error");
        }
    }

    function resetForm() {
        editId = null;
        ["name", "url", "module", "headers", "body", "expect", "extract_var", "tags"].forEach(id => document.getElementById(id).value = "");
        document.getElementById("method").value = "GET";
        document.getElementById("timeout").value = "10";
        document.getElementById("retry").value = "0";
        document.getElementById("env_id").value = "";
        document.getElementById("saveBtn").innerText = "保存用例";
        document.getElementById("cancelEditBtn").style.display = "none";
    }

    function cancelEdit() {
        resetForm();
        showAlert("已取消编辑", "info");
    }

    async function editCase(id) {
        try {
            const res = await httpGet("/api/test/cases?page=1&page_size=1000");
            const caseData = (res.data.list || res.data).find(c => c.id == id);
            if (!caseData) {
                showAlert("未找到该用例数据", "error");
                return;
            }

            editId = id;
            document.getElementById("name").value = caseData.name;
            document.getElementById("method").value = caseData.method;
            document.getElementById("url").value = caseData.url;
            document.getElementById("module").value = caseData.module || "";
            document.getElementById("headers").value = caseData.headers || "{}";
            document.getElementById("body").value = caseData.body || "{}";
            document.getElementById("expect").value = caseData.expect || "";
            document.getElementById("extract_var").value = caseData.extract_var || "";
            document.getElementById("timeout").value = caseData.timeout || 10;
            document.getElementById("retry").value = caseData.retry || 0;
            document.getElementById("tags").value = caseData.tags || "";
            document.getElementById("env_id").value = caseData.env_id || "";

            document.getElementById("saveBtn").innerText = "更新用例";
            document.getElementById("cancelEditBtn").style.display = "inline-block";
            window.scrollTo({ top: 0, behavior: 'smooth' });
            showAlert("已加载用例，修改后点击更新", "info");
        } catch (err) {
            showAlert("加载数据失败: " + err.message, "error");
        }
    }

    async function runSingle(id) {
        try {
            showAlert("执行中...", "info");
            document.getElementById("result").innerHTML = '<span class="loading-spinner"></span><span class="loading-text">执行中，请稍候...</span>';
            const res = await httpPost(`/api/test/case/${id}/run`, {});
            document.getElementById("result").innerText = JSON.stringify(res, null, 2);
            if (res.data && res.data.status === "PASS") showAlert("执行通过", "success");
            else showAlert("执行失败或出错", "error");
        } catch (err) {
            showAlert("执行出错", "error");
        }
    }

    async function deleteCase(id) {
        if (!confirm("确定删除吗？")) return;
        try {
            await fetch(`/api/test/case/${id}`, {
                method: "DELETE",
                headers: {"Authorization": "Bearer " + localStorage.getItem("access_token")}
            });
            showAlert("删除成功", "success");
            loadCases();
        } catch (err) {
            showAlert("删除失败", "error");
        }
    }

    async function batchRun() {
        const checkboxes = document.querySelectorAll(".case-item:checked");
        const ids = Array.from(checkboxes).map(cb => parseInt(cb.value));

        if (ids.length === 0) {
            showAlert("请至少勾选一个用例", "warning");
            return;
        }

        showAlert(`已提交 ${ids.length} 个用例到 Celery 执行`, "info");
        document.getElementById("result").innerHTML = `<span class="loading-text">任务已提交，task_id 获取中...</span>`;

        try {
            const wc = parseInt(document.getElementById("workerCount").value) || 1;
            const res = await httpPost("/api/test/batch/run", { ids: ids, worker_count: wc });
            const task_id = res.data && (res.data.task_id || res.data.batch_id);
            if (task_id) {
                document.getElementById("result").innerHTML = `<span class="loading-text">批量任务已提交 (${task_id.slice(0, 8)}...)，<a href="/api/ai/task/${task_id}" target="_blank">查看进度</a></span>`;
            } else {
                document.getElementById("result").innerHTML = `<span class="loading-text">提交成功</span>`;
            }
        } catch (err) {
            document.getElementById("result").innerHTML = `<span style="color:red;">提交失败: ${err.message}</span>`;
        }
    }

    function showPostmanImport() {
        document.getElementById("postmanImportForm").style.display = "block";
    }

    async function importPostman() {
        const input = document.getElementById("postmanInput").value.trim();
        if (!input) { showAlert("请粘贴 Postman Collection JSON", "warning"); return; }
        try {
            const res = await httpPost("/api/test/import/postman", JSON.parse(input));
            showAlert(res.msg || `导入成功，新增 ${res.data.imported} 条用例`, "success");
            document.getElementById("postmanImportForm").style.display = "none";
            document.getElementById("postmanInput").value = "";
            loadCases();
        } catch (e) { showAlert("导入失败: " + e.message, "error"); }
    }

    async function exportCases() {
        const fmt = prompt("导出格式：json 或 csv", "json");
        if (!fmt) return;
        try {
            const res = await httpGet(`/api/test/cases/export?format=${fmt}`);
            const blob = new Blob([JSON.stringify(res.data, null, 2)], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `testpilot_cases.${fmt}`;
            a.click();
            URL.revokeObjectURL(url);
            showAlert(`导出成功，共 ${res.data.count} 条用例`, "success");
        } catch (e) { showAlert("导出失败", "error"); }
    }
</script>
{% endblock %}
