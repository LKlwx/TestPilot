{% extends "base.html" %}

{% block title %}性能报告{% endblock %}

{% block content %}
<div class="card">
    <h3>性能压测报告</h3>
    <table class="table">
        <thead>
        <tr>
            <th>序号</th>
            <th>用例名称</th>
            <th>并发</th>
            <th>总请求</th>
            <th>成功</th>
            <th>失败</th>
            <th>QPS</th>
            <th>平均耗时</th>
            <th>标签</th>
            <th>时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="reportList"></tbody>
    </table>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content" style="width:75%;">
        <h3 class="modal-header">详情</h3>
        <div id="detailContent" style="max-height:400px; overflow-y:auto; line-height:1.8;"></div>
        <br>
        <button class="btn btn-info" id="showQpsBtn" style="display:none;" onclick="showQpsChart()">查看 QPS 曲线</button>
        <button class="btn btn-info" onclick="copyPerfReportDetail()">复制压测摘要</button>
        <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
    </div>
</div>

<!-- QPS 曲线弹窗 -->
<div class="modal-overlay" id="qpsModal">
    <div class="modal-content" style="width:85%; height:80%;">
        <h3 class="modal-header">逐秒 QPS 曲线</h3>
        <div id="qpsChart" style="width:100%; height:calc(100% - 80px);"></div>
        <br>
        <button class="btn btn-secondary" onclick="document.getElementById('qpsModal').classList.remove('active')">关闭</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/echarts.min.js"></script>
<script>
    window.onload = function () {
        checkLogin();
        loadReports();
    };

    async function loadReports() {
        try {
            const res = await httpGet("/api/performance/reports");
            const list = res.data || [];
            let html = "";

            if (list.length === 0) {
                html = '<tr><td colspan="10" style="text-align:center; padding:40px; color:#999;">暂无性能压测报告数据</td></tr>';
            } else {
                list.forEach((item, index) => {
                    const localTag = item.is_local ? '<span style="background:#ffc107; color:#856404; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:600;">本机压测</span>' : '-';
                    html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.case_name}</td>
                        <td>${item.concurrency}</td>
                        <td>${item.total}</td>
                        <td>${item.success}</td>
                        <td>${item.fail}</td>
                        <td>${item.qps}</td>
                        <td>${item.avg_time}ms</td>
                        <td>${localTag}</td>
                        <td>${item.create_time}</td>
                        <td><button class="btn btn-primary" onclick="showDetail(${item.id})">查看</button></td>
                    </tr>`;
                });
            }

            document.getElementById("reportList").innerHTML = html;
        } catch (err) {
            showAlert("加载性能报告失败", "error");
            console.error(err);
        }
    }

    async function showDetail(id) {
        try {
            const res = await httpGet(`/api/performance/report/${id}`);
            window.currentPerfReportData = res.data;
            const info = res.data;

            const localLabel = info.is_local ? '<span style="background:#ffc107; color:#856404; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:600; margin-left:8px;">⚠️ 本机压测（数据可能失真）</span>' : '';
            document.getElementById("detailContent").innerHTML = `
                <p><strong>用例名称：</strong>${info.case_name}${localLabel}</p>
                <p><strong>并发数：</strong>${info.concurrency}</p>
                <p><strong>总请求：</strong>${info.total}</p>
                <p><strong>成功：</strong>${info.success} ｜ <strong>失败：</strong>${info.fail}</p>
                <p><strong>成功率：</strong>${info.success_rate ? info.success_rate + '%' : '100%'}</p>
                <p><strong>QPS：</strong>${info.qps}</p>
                <p><strong>平均响应：</strong>${info.avg_time}ms</p>
                <p><strong>P90 响应：</strong>${info.p90 ? info.p90 + 'ms' : '-'}</p>
                <p><strong>P99 响应：</strong>${info.p99 ? info.p99 + 'ms' : '-'}</p>
                <p><strong>最小响应：</strong>${info.min_time ? info.min_time + 'ms' : '-'}</p>
                <p><strong>最大响应：</strong>${info.max_time ? info.max_time + 'ms' : '-'}</p>
                <p><strong>生成时间：</strong>${info.create_time}</p>
                ${info.is_local ? '<p style="color:#856404; background:#fff7e6; padding:10px; border-radius:6px; margin-top:10px;"><strong>⚠️ 提醒：</strong>本测试针对本地服务发起，测得数据包含压测工具自身开销，仅供参考。</p>' : ''}
            `;

            document.getElementById("detailModal").classList.add("active");

            // 判断是否有 QPS 曲线数据，有则显示按钮
            const qpsBtn = document.getElementById("showQpsBtn");
            const extra = info.extra;
            if (extra && extra.qps_series && extra.qps_series.length >= 2) {
                window._qpsSeries = extra.qps_series;
                qpsBtn.style.display = "inline-block";
            } else {
                qpsBtn.style.display = "none";
            }
        } catch (err) {
            showAlert("加载详情失败", "error");
            console.error(err);
        }
    }

    function closeModal() {
        document.getElementById("detailModal").classList.remove("active");
        document.getElementById("qpsModal").classList.remove("active");
    }

    function copyPerfReportDetail() {
        if (!window.currentPerfReportData) return;
        const d = window.currentPerfReportData;
        const text = `【性能压测报告】\n用例名称：${d.case_name}\n并发数：${d.concurrency}\nQPS：${d.qps}\n平均响应：${d.avg_time}ms\nP99响应：${d.p99 || '-'}ms\n成功率：${d.success_rate || '100'}%`;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert("压测摘要已复制", "success");
            }).catch(() => {
                fallbackCopyTextToClipboard(text);
            });
        } else {
            fallbackCopyTextToClipboard(text);
        }
    }

    function showQpsChart() {
        const series = window._qpsSeries;
        if (!series) return;

        document.getElementById("qpsModal").classList.add("active");

        setTimeout(() => {
            const chartDom = document.getElementById("qpsChart");
            const myChart = echarts.init(chartDom);
            myChart.setOption({
                title: { text: "", left: "center" },
                tooltip: { trigger: "axis" },
                toolbox: {
                    feature: {
                        dataZoom: { show: true },
                        restore: { show: true },
                        saveAsImage: { show: true },
                    },
                },
                dataZoom: [{ type: "inside", start: 0, end: 100 }],
                xAxis: { type: "category", name: "秒", data: series.map((_, i) => i) },
                yAxis: { type: "value", name: "请求/秒" },
                grid: { left: 60, right: 30, bottom: 40, top: 30 },
                series: [{
                    type: "line",
                    data: series,
                    smooth: true,
                    areaStyle: { opacity: 0.15 },
                    lineStyle: { width: 2 },
                    itemStyle: { color: "#5470c6" },
                    markLine: {
                        data: [{ type: "average", name: "平均" }],
                        label: { formatter: "平均 QPS: {c}" },
                    },
                }],
            });
            myChart.resize();
            window._qpsChart = myChart;
        }, 100);
    }

    function fallbackCopyTextToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showAlert("压测摘要已复制", "success");
        } catch (err) {
            showAlert("复制失败，请手动复制", "error");
        }
        document.body.removeChild(textArea);
    }
</script>
{% endblock %}
