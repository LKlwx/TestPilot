{% extends "base.html" %}

{% block title %}性能报告{% endblock %}

{% block content %}
<div class="card">
    <h3>性能压测报告</h3>
    <div style="margin-bottom:12px; display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
        <input id="keyword" class="form-input" placeholder="搜索用例名称..." style="width:200px;">
        <input id="startDate" class="form-input" type="text" placeholder="开始日期如 2026-04-22" style="width:180px;">
        <input id="endDate" class="form-input" type="text" placeholder="结束日期如 2026-04-22" style="width:180px;">
        <button class="btn btn-primary" onclick="search()">搜索</button>
        <button class="btn btn-secondary" onclick="resetSearch()">重置</button>
    </div>
    <table class="table">
        <thead>
        <tr>
            <th>序号</th>
            <th>用例名称</th>
            <th>并发</th>
            <th>总请求</th>
            <th>成功</th>
            <th>失败</th>
            <th>QPS</th>
            <th>平均耗时</th>
            <th>标签</th>
            <th>时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="reportList"></tbody>
    </table>
    <div class="pagination" style="margin-top:12px;">
        <button id="prevBtn" class="btn btn-secondary" onclick="prevPage()">上一页</button>
        <span id="pageInfo" style="margin:0 12px;"></span>
        <button id="nextBtn" class="btn btn-secondary" onclick="nextPage()">下一页</button>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content" style="width:75%;">
        <h3 class="modal-header">详情</h3>
        <div id="detailContent" style="max-height:400px; overflow-y:auto; line-height:1.8;"></div>
        <br>
        <button class="btn btn-info" id="showQpsBtn" style="display:none;" onclick="showQpsChart()">查看 QPS 曲线</button>
        <button class="btn btn-info" onclick="copyPerfReportDetail()">复制压测摘要</button>
        <button class="btn btn-warning" onclick="setAsBaseline(window._currentReportId)">设为此用例基线</button>
        <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
    </div>
</div>

<!-- QPS 曲线弹窗 -->
<div class="modal-overlay" id="qpsModal">
    <div class="modal-content" style="width:85%; height:80%;">
        <h3 class="modal-header">逐秒 QPS 曲线</h3>
        <div id="qpsChart" style="width:100%; height:calc(100% - 80px);"></div>
        <br>
        <button class="btn btn-secondary" onclick="document.getElementById('qpsModal').classList.remove('active')">关闭</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/echarts.min.js"></script>
<script>
    let currentPage = 1;
    let totalPages = 1;

    window.onload = function () {
        checkLogin();
        loadReports();
    };

    async function loadReports() {
        try {
            const kw = document.getElementById("keyword").value;
            const sd = document.getElementById("startDate").value;
            const ed = document.getElementById("endDate").value;
            const params = new URLSearchParams({page: currentPage, page_size: 20});
            if (kw) params.set("keyword", kw);
            if (sd) params.set("start_date", sd);
            if (ed) params.set("end_date", ed);
            const res = await httpGet("/api/performance/reports?" + params.toString());
            const data = res.data || {};
            const list = data.list || data || [];
            totalPages = data.total_pages || 1;
            let html = "";

            if (list.length === 0) {
                html = '<tr><td colspan="11" style="text-align:center; padding:40px; color:#999;">暂无性能压测报告数据</td></tr>';
            } else {
                list.forEach((item, index) => {
                    const localTag = item.is_local ? '<span style="background:#ffc107; color:#856404; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:600;">本机压测</span>' : '-';
                    html += `
                    <tr>
                        <td>${(currentPage - 1) * 20 + index + 1}</td>
                        <td>${item.case_name}</td>
                        <td>${item.concurrency}</td>
                        <td>${item.total}</td>
                        <td>${item.success}</td>
                        <td>${item.fail}</td>
                        <td>${item.qps}</td>
                        <td>${item.avg_time}ms</td>
                        <td>${localTag}</td>
                        <td>${item.create_time}</td>
                        <td><button class="btn btn-primary" onclick="showDetail(${item.id})">查看</button></td>
                    </tr>`;
                });
            }

            document.getElementById("reportList").innerHTML = html;
            const pageInfo = document.getElementById("pageInfo");
            if (pageInfo) pageInfo.innerText = `第 ${currentPage} 页 / 共 ${totalPages} 页 (共 ${data.total} 条)`;
            const prevBtn = document.getElementById("prevBtn");
            const nextBtn = document.getElementById("nextBtn");
            if (prevBtn) prevBtn.disabled = currentPage <= 1;
            if (nextBtn) nextBtn.disabled = currentPage >= totalPages;
        } catch (err) {
            console.error(err);
        }
    }

    function search() { currentPage = 1; loadReports(); }
    function resetSearch() {
        document.getElementById("keyword").value = "";
        document.getElementById("startDate").value = "";
        document.getElementById("endDate").value = "";
        currentPage = 1;
        loadReports();
    }
    function prevPage() { if (currentPage > 1) { currentPage--; loadReports(); } }
    function nextPage() { if (currentPage < totalPages) { currentPage++; loadReports(); } }

    async function showDetail(id) {
        try {
            const res = await httpGet(`/api/performance/report/${id}`);
            window.currentPerfReportData = res.data;
            window._currentReportId = id;
            const info = res.data;

            const localLabel = info.is_local ? '<span style="background:#ffc107; color:#856404; padding:2px 8px; border-radius:4px; font-size:12px; font-weight:600; margin-left:8px;">⚠️ 本机压测（数据可能失真）</span>' : '';

            // 退化标记
            let degTag = "";
            const deg = info.degradation;
            if (deg) {
                const colors = {severe:"#e74c3c",minor:"#f39c12",improved:"#27ae60",stable:"#95a5a6"};
                degTag = `<span style="background:${colors[deg.level]}20; color:${colors[deg.level]}; padding:2px 10px; border-radius:4px; font-size:13px; font-weight:600; margin-left:8px;">${deg.label} (${deg.pct > 0 ? '+' : ''}${deg.pct}%)</span>`;
            }

            document.getElementById("detailContent").innerHTML = `
                <p><strong>用例名称：</strong>${info.case_name}${localLabel}${degTag}</p>
                <p><strong>并发数：</strong>${info.concurrency}</p>
                <p><strong>总请求：</strong>${info.total}</p>
                <p><strong>成功：</strong>${info.success} ｜ <strong>失败：</strong>${info.fail}</p>
                <p><strong>成功率：</strong>${info.success_rate ? info.success_rate + '%' : '100%'}</p>
                <p><strong>QPS：</strong>${info.qps}</p>
                <p><strong>平均响应：</strong>${info.avg_time}ms</p>
                <p><strong>P90 响应：</strong>${info.p90 ? info.p90 + 'ms' : '-'}</p>
                <p><strong>P99 响应：</strong>${info.p99 ? info.p99 + 'ms' : '-'}</p>
                <p><strong>最小响应：</strong>${info.min_time ? info.min_time + 'ms' : '-'}</p>
                <p><strong>最大响应：</strong>${info.max_time ? info.max_time + 'ms' : '-'}</p>
                <p><strong>生成时间：</strong>${info.create_time}</p>
                ${deg ? `<p style="margin-top:8px;"><strong>基线对比：</strong></p><table style="font-size:13px; border-collapse:collapse; margin-top:4px;"><tr style="background:#f5f5f5;"><th style="padding:4px 12px; border:1px solid #ddd;">指标</th><th style="padding:4px 12px; border:1px solid #ddd;">当前</th><th style="padding:4px 12px; border:1px solid #ddd;">基线</th></tr><tr><td style="padding:4px 12px; border:1px solid #ddd;">P90</td><td style="padding:4px 12px; border:1px solid #ddd;">${info.p90}ms</td><td style="padding:4px 12px; border:1px solid #ddd;">${deg.baseline_p90}ms</td></tr><tr><td style="padding:4px 12px; border:1px solid #ddd;">P99</td><td style="padding:4px 12px; border:1px solid #ddd;">${info.p99 || '-'}ms</td><td style="padding:4px 12px; border:1px solid #ddd;">${deg.baseline_p99 || '-'}ms</td></tr><tr><td style="padding:4px 12px; border:1px solid #ddd;">平均耗时</td><td style="padding:4px 12px; border:1px solid #ddd;">${info.avg_time}ms</td><td style="padding:4px 12px; border:1px solid #ddd;">${deg.baseline_avg || '-'}ms</td></tr></table>` : ''}
                ${info.is_local ? '<p style="color:#856404; background:#fff7e6; padding:10px; border-radius:6px; margin-top:10px;"><strong>⚠️ 提醒：</strong>本测试针对本地服务发起，测得数据包含压测工具自身开销，仅供参考。</p>' : ''}
            `;

            document.getElementById("detailModal").classList.add("active");

            // 判断是否有 QPS 曲线数据，有则显示按钮
            const qpsBtn = document.getElementById("showQpsBtn");
            const extra = info.extra;
            if (extra && extra.qps_series && extra.qps_series.length >= 2) {
                window._qpsSeries = extra.qps_series;
                qpsBtn.style.display = "inline-block";
            } else {
                qpsBtn.style.display = "none";
            }
        } catch (err) {
            showAlert("加载详情失败", "error");
            console.error(err);
        }
    }

    function closeModal() {
        document.getElementById("detailModal").classList.remove("active");
        document.getElementById("qpsModal").classList.remove("active");
    }

    function copyPerfReportDetail() {
        if (!window.currentPerfReportData) return;
        const d = window.currentPerfReportData;
        const text = `【性能压测报告】\n用例名称：${d.case_name}\n并发数：${d.concurrency}\nQPS：${d.qps}\n平均响应：${d.avg_time}ms\nP99响应：${d.p99 || '-'}ms\n成功率：${d.success_rate || '100'}%`;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert("压测摘要已复制", "success");
            }).catch(() => {
                fallbackCopyTextToClipboard(text);
            });
        } else {
            fallbackCopyTextToClipboard(text);
        }
    }

    function showQpsChart() {
        const series = window._qpsSeries;
        if (!series) return;

        document.getElementById("qpsModal").classList.add("active");

        setTimeout(() => {
            const chartDom = document.getElementById("qpsChart");
            const myChart = echarts.init(chartDom);
            myChart.setOption({
                title: { text: "", left: "center" },
                tooltip: { trigger: "axis" },
                toolbox: {
                    feature: {
                        dataZoom: { show: true },
                        restore: { show: true },
                        saveAsImage: { show: true },
                    },
                },
                dataZoom: [{ type: "inside", start: 0, end: 100 }],
                xAxis: { type: "category", name: "秒", data: series.map((_, i) => i) },
                yAxis: { type: "value", name: "请求/秒" },
                grid: { left: 60, right: 30, bottom: 40, top: 30 },
                series: [{
                    type: "line",
                    data: series,
                    smooth: true,
                    areaStyle: { opacity: 0.15 },
                    lineStyle: { width: 2 },
                    itemStyle: { color: "#5470c6" },
                    markLine: {
                        data: [{ type: "average", name: "平均" }],
                        label: { formatter: "平均 QPS: {c}" },
                    },
                }],
            });
            myChart.resize();
            window._qpsChart = myChart;
        }, 100);
    }

    async function setAsBaseline(reportId) {
        if (!confirm("确定将本次测试结果设为该用例的性能基线？")) return;
        try {
            const res = await httpPost(`/api/performance/report/${reportId}/baseline`, {});
            showAlert(res.msg || "基线设置成功", "success");
        } catch (err) {
            showAlert("设置基线失败", "error");
        }
    }

    function fallbackCopyTextToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showAlert("压测摘要已复制", "success");
        } catch (err) {
            showAlert("复制失败，请手动复制", "error");
        }
        document.body.removeChild(textArea);
    }
</script>
{% endblock %}
