<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>性能报告</title>
    <link rel="stylesheet" href="/static/css/global.css">
</head>
<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px;">
        <span id="roleText" style="margin-right:15px;"></span>
        <div style="display:inline-block; position:relative;">
            <a href="#" onclick="toggleUserMenu(); return false;" style="color:#fff; margin-right:15px; text-decoration:none;">▼</a>
            <div id="userMenu" style="display:none; position:absolute; right:0; top:25px; background:#fff; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.15); min-width:120px; z-index:9999;">
                <a href="/api/auth/profile/page" style="display:block; padding:10px 15px; color:#333; text-decoration:none;">个人中心</a>
                <a href="#" onclick="logout(); return false;" style="display:block; padding:10px 15px; color:#dc3545; text-decoration:none;">退出登录</a>
            </div>
        </div>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>

        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>

        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>

        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
        <a id="operationLogMenu" href="/api/auth/operation/logs/page" style="display:none;">操作日志</a>
    </div>
    <div class="content">
        <div class="card">
            <h3>性能压测报告</h3>
            <table>
                <tr>
                    <th>序号</th>
                    <th>用例名称</th>
                    <th>并发</th>
                    <th>总请求</th>
                    <th>成功</th>
                    <th>失败</th>
                    <th>QPS</th>
                    <th>平均耗时</th>
                    <th>时间</th>
                    <th>操作</th>
                </tr>
                <tbody id="reportList"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal" id="detailModal"
     style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;">
    <div style="background:#fff; margin:50px auto; padding:20px; width:70%; border-radius:8px;">
        <h3>详情</h3>
        <div id="detailContent" style="max-height:400px; overflow-y:auto; line-height:1.8;"></div>
        <br>
        <button onclick="closeModal()">关闭</button>
    </div>
</div>
<script src="/static/js/common.js"></script>
<script>
    window.onload = function () {
        checkLogin();
        loadReports();
    };

    // 加载报告列表
    async function loadReports() {
        try {
            const res = await httpGet("/api/performance/reports");
            const list = res.data || [];
            let html = "";

            list.forEach((item, index) => {
                html += `
                <tr>
                    <td>${index + 1}</td>
                    <td>${item.case_name}</td>
                    <td>${item.concurrency}</td>
                    <td>${item.total}</td>
                    <td>${item.success}</td>
                    <td>${item.fail}</td>
                    <td>${item.qps}</td>
                    <td>${item.avg_time}ms</td>
                    <td>${item.create_time}</td>
                    <td><button onclick="showDetail(${item.id})">查看</button></td>
                </tr>`;
            });

            document.getElementById("reportList").innerHTML = html;
        } catch (err) {
            showAlert("加载性能报告失败", "error");
            console.error(err);
        }
    }

    // 查看详细
    async function showDetail(id) {
        try {
            const res = await httpGet(`/api/performance/report/${id}`);
            const info = res.data;

            document.getElementById("detailContent").innerHTML = `                <p><strong>用例名称：</strong>${info.case_name}</p>
                <p><strong>并发数：</strong>${info.concurrency}</p>
                <p><strong>总请求：</strong>${info.total}</p>
                <p><strong>成功：</strong>${info.success} ｜ <strong>失败：</strong>${info.fail}</p>
                <p><strong>成功率：</strong>${info.success_rate ? info.success_rate + '%' : '100%'}</p>
                <p><strong>QPS：</strong>${info.qps}</p>
                <p><strong>平均响应：</strong>${info.avg_time}ms</p>
                <p><strong>P90 响应：</strong>${info.p90 ? info.p90 + 'ms' : '-'}</p>
                <p><strong>P99 响应：</strong>${info.p99 ? info.p99 + 'ms' : '-'}</p>
                <p><strong>最小响应：</strong>${info.min_time ? info.min_time + 'ms' : '-'}</p>
                <p><strong>最大响应：</strong>${info.max_time ? info.max_time + 'ms' : '-'}</p>
                <p><strong>生成时间：</strong>${info.create_time}</p>
            `;
            document.getElementById("detailModal").style.display = "block";
        } catch (err) {
            showAlert("加载详情失败", "error");
            console.error(err);
        }
    }

    // 关闭弹窗
    function closeModal() {
        document.getElementById("detailModal").style.display = "none";
    }
</script>
</body>
</html>
