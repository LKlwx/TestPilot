{% extends "base.html" %}

{% block title %}性能报告{% endblock %}

{% block content %}
<div class="card">
    <h3>性能压测报告</h3>
    <table class="table">
        <thead>
        <tr>
            <th>序号</th>
            <th>用例名称</th>
            <th>并发</th>
            <th>总请求</th>
            <th>成功</th>
            <th>失败</th>
            <th>QPS</th>
            <th>平均耗时</th>
            <th>时间</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody id="reportList"></tbody>
    </table>
</div>

<!-- 详情弹窗 -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content" style="width:70%;">
        <h3 class="modal-header">详情</h3>
        <div id="detailContent" style="max-height:400px; overflow-y:auto; line-height:1.8;"></div>
        <br>
        <button class="btn btn-info" onclick="copyPerfReportDetail()">复制压测摘要</button>
        <button class="btn btn-secondary" onclick="closeModal()">关闭</button>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    window.onload = function () {
        checkLogin();
        loadReports();
    };

    async function loadReports() {
        try {
            const res = await httpGet("/api/performance/reports");
            const list = res.data || [];
            let html = "";

            if (list.length === 0) {
                html = '<tr><td colspan="10" style="text-align:center; padding:40px; color:#999;">暂无性能压测报告数据</td></tr>';
            } else {
                list.forEach((item, index) => {
                    html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${item.case_name}</td>
                        <td>${item.concurrency}</td>
                        <td>${item.total}</td>
                        <td>${item.success}</td>
                        <td>${item.fail}</td>
                        <td>${item.qps}</td>
                        <td>${item.avg_time}ms</td>
                        <td>${item.create_time}</td>
                        <td><button class="btn btn-primary" onclick="showDetail(${item.id})">查看</button></td>
                    </tr>`;
                });
            }

            document.getElementById("reportList").innerHTML = html;
        } catch (err) {
            showAlert("加载性能报告失败", "error");
            console.error(err);
        }
    }

    async function showDetail(id) {
        try {
            const res = await httpGet(`/api/performance/report/${id}`);
            window.currentPerfReportData = res.data; // 暂存数据用于复制
            const info = res.data;

            document.getElementById("detailContent").innerHTML = `
                <p><strong>用例名称：</strong>${info.case_name}</p>
                <p><strong>并发数：</strong>${info.concurrency}</p>
                <p><strong>总请求：</strong>${info.total}</p>
                <p><strong>成功：</strong>${info.success} ｜ <strong>失败：</strong>${info.fail}</p>
                <p><strong>成功率：</strong>${info.success_rate ? info.success_rate + '%' : '100%'}</p>
                <p><strong>QPS：</strong>${info.qps}</p>
                <p><strong>平均响应：</strong>${info.avg_time}ms</p>
                <p><strong>P90 响应：</strong>${info.p90 ? info.p90 + 'ms' : '-'}</p>
                <p><strong>P99 响应：</strong>${info.p99 ? info.p99 + 'ms' : '-'}</p>
                <p><strong>最小响应：</strong>${info.min_time ? info.min_time + 'ms' : '-'}</p>
                <p><strong>最大响应：</strong>${info.max_time ? info.max_time + 'ms' : '-'}</p>
                <p><strong>生成时间：</strong>${info.create_time}</p>
            `;
            document.getElementById("detailModal").classList.add("active");
        } catch (err) {
            showAlert("加载详情失败", "error");
            console.error(err);
        }
    }

    function copyPerfReportDetail() {
        if (!window.currentPerfReportData) return;
        const d = window.currentPerfReportData;
        const text = `【性能压测报告】\n用例名称：${d.case_name}\n并发数：${d.concurrency}\nQPS：${d.qps}\n平均响应：${d.avg_time}ms\nP99响应：${d.p99 || '-'}ms\n成功率：${d.success_rate || '100'}%`;
        
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert("压测摘要已复制", "success");
            }).catch(err => {
                console.error('复制失败:', err);
                fallbackCopyTextToClipboard(text);
            });
        } else {
            fallbackCopyTextToClipboard(text);
        }
    }

    function closeModal() {
        document.getElementById("detailModal").classList.remove("active");
    }

    function fallbackCopyTextToClipboard(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        textArea.style.position = "fixed";
        textArea.style.left = "-9999px";
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
            document.execCommand('copy');
            showAlert("压测摘要已复制", "success");
        } catch (err) {
            showAlert("复制失败，请手动复制", "error");
        }
        document.body.removeChild(textArea);
    }
</script>
{% endblock %}
