<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI测试失败分析</title>
    <link rel="stylesheet" href="/static/css/global.css">
    <style>
        pre {
            background: #f7f7f7;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #eee;
            white-space: pre-wrap;
            max-height: 500px;
            overflow-y: auto;
        }

        button {
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 6px;
        }
    </style>
</head>
<body>
<div class="top">
    TestPilot 智能自动化测试平台
    <div style="float:right; color:white; margin-top:10px;">
        <span id="roleText" style="margin-right:15px;"></span>
        <div style="display:inline-block; position:relative;">
            <a href="#" onclick="toggleUserMenu(); return false;" style="color:#fff; margin-right:15px; text-decoration:none;">▼</a>
            <div id="userMenu" style="display:none; position:absolute; right:0; top:25px; background:#fff; border-radius:4px; box-shadow:0 2px 8px rgba(0,0,0,0.15); min-width:120px; z-index:9999;">
                <a href="/api/auth/profile/page" style="display:block; padding:10px 15px; color:#333; text-decoration:none;">个人中心</a>
                <a href="#" onclick="logout(); return false;" style="display:block; padding:10px 15px; color:#dc3545; text-decoration:none;">退出登录</a>
            </div>
        </div>
    </div>
</div>
<div class="main">
    <div class="menu">
        <a href="/api/auth/home">控制台首页</a>
        <div class="dropdown">
            <div class="dropbtn">自动化测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/page">接口自动化测试</a>
                <a href="/api/ui/page">UI自动化测试</a>
            </div>
        </div>
        <div class="dropdown">
            <div class="dropbtn">测试报告 ▼</div>
            <div class="dropdown-content">
                <a href="/api/test/reports">接口测试报告</a>
                <a href="/api/ui/reports">UI测试报告</a>
                <a href="/api/performance/reports/page">性能测试报告</a>
            </div>
        </div>
        <a href="/api/performance/page">性能测试</a>
        <div class="dropdown">
            <div class="dropbtn">AI智能测试 ▼</div>
            <div class="dropdown-content">
                <a href="/api/ai/generate/api/page">AI接口用例生成</a>
                <a href="/api/ai/generate/ui/page">AI UI用例生成</a>
                <a href="/api/ai/analyze/page">测试失败分析</a>
            </div>
        </div>
        <a id="userManageMenu" href="/api/auth/user/list" style="display:none;">用户管理</a>
        <a id="operationLogMenu" href="/api/auth/operation/logs/page" style="display:none;">操作日志</a>
    </div>

    <div class="content">
        <div class="card">
            <h3>AI 测试失败分析</h3>
            <br>
            <textarea id="log" rows="6" placeholder="粘贴失败日志、报错信息"></textarea>
            <br><br>
            <button onclick="analyze()">开始分析</button>
        </div>
        <div class="card">
            <h3>分析结果</h3>
            <pre id="result">等待分析...</pre>
        </div>
        <div class="card">
            <h3>历史记录</h3>
            <table class="table" id="historyTable">
                <thead>
                    <tr><th>时间</th><th>输入日志</th><th>分析结果</th></tr>
                </thead>
                <tbody id="historyBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="/static/js/common.js"></script>
<script>
    async function analyze() {
        const logContent = document.getElementById("log").value.trim();
        if (!logContent) { showAlert("请输入失败日志", "warning"); return; }
        try {
            showAlert("AI 分析中，请稍候...", "success");
            const res = await httpPost("/api/ai/analyze", {log: logContent});
            if (res.code === 200 && res.data) {
                document.getElementById("result").innerText = res.data.result;
                showAlert("AI 分析完成", "success");
                loadHistory();
            } else { showAlert(res.msg || "分析失败", "error"); }
        } catch (err) { showAlert("网络异常或服务错误", "error"); }
    }

    async function loadHistory() {
        try {
            const res = await httpGet("/api/ai/history?type=analyze_failure");
            if (res.code === 200) {
                const tbody = document.getElementById("historyBody");
                tbody.innerHTML = res.data.map(item =>
                    `<tr><td>${item.time}</td><td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${item.input}</td><td>${item.output}</td></tr>`
                ).join("");
            }
        } catch (err) { console.error("加载历史失败", err); }
    }
    loadHistory();
</script>
</body>
</html>
