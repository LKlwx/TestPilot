{% extends "base.html" %}

{% block title %}AI UI用例生成{% endblock %}

{% block content %}
<div class="card">
    <h3>AI UI 用例生成</h3>
    <textarea id="scene" class="form-textarea" rows="4" placeholder="输入UI操作场景，例如：登录、注册、搜索商品"></textarea>
    <br><br>
    <button class="btn btn-primary" onclick="generate()">生成用例</button>
    <button class="btn btn-success" onclick="saveCase()">保存到UI用例库</button>
</div>
<div class="card">
    <h3>生成结果</h3>
    <pre id="result" class="code-block">等待生成</pre>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentData = null;

    async function generate() {
        const scene = document.getElementById("scene").value.trim();

        if (!scene) {
            showAlert("请输入UI操作场景", "warning");
            return;
        }

        try {
            showAlert("AI 生成中，请稍候...", "success");
            const res = await httpPost("/api/ai/generate/ui", {scene});

            if (res.code === 200 && res.data) {
                currentData = res.data;
                document.getElementById("result").innerText = JSON.stringify(res.data, null, 2);
                showAlert("生成成功", "success");
            } else {
                showAlert(res.msg || "生成失败", "error");
            }
        } catch (err) {
            showAlert("网络异常或服务错误", "error");
            console.error("AI UI生成接口异常：", err);
        }
    }

    async function saveCase() {
        if (!currentData) {
            showAlert("请先生成用例", "error");
            return;
        }
        try {
            const res = await httpPost("/api/ai/save/ui", currentData);
            showAlert(res.msg || "保存成功", "success");
        } catch (err) {
            showAlert("保存失败", "error");
            console.error("保存UI用例异常：", err);
        }
    }
</script>
{% endblock %}
