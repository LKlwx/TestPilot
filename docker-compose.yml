services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-testpilot}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-testpilot}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?Please set SECRET_KEY environment variable}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Please set JWT_SECRET_KEY environment variable}
    depends_on:
      - redis
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  worker:
    build: .
    command: celery -A celery_app.celery_app worker --loglevel=info
    environment:
      - FLASK_APP=run.py
      - REDIS_URL=redis://:${REDIS_PASSWORD:-testpilot}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?Please set SECRET_KEY environment variable}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Please set JWT_SECRET_KEY environment variable}
    depends_on:
      - redis
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped

  flower:
    build: .
    command: celery -A celery_app.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-testpilot}
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-testpilot}@redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build: .
    command: celery -A celery_app.celery_app beat --loglevel=info
    environment:
      - FLASK_APP=run.py
      - REDIS_URL=redis://:${REDIS_PASSWORD:-testpilot}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:?Please set SECRET_KEY environment variable}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Please set JWT_SECRET_KEY environment variable}
    depends_on:
      - redis
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

volumes:
  redis_data:
