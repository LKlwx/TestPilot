services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_APP=run.py
      - FLASK_DEBUG=${FLASK_DEBUG:-0}
      # 生产环境必须设置强密钥（通过 .env 文件或 docker-compose 命令传入）
      - SECRET_KEY=${SECRET_KEY:?Please set SECRET_KEY environment variable}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Please set JWT_SECRET_KEY environment variable}
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s